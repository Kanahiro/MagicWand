name: export_plugin

on:
  release:
    types: [published]

env:
  PLUGIN_NAME: MagicWand

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create Plugin Directory
        run: |
          mkdir ${{env.PLUGIN_NAME}}
          find . -type f | grep -ve './.git' \
            -ve '.github' \
            -ve '__pycache__/' \
            -ve './tests' \
            -ve './conftest.py' \
            -ve './pyproject.toml' \
            -ve './.gitignore' \
            -ve './README.md' \
            -ve './img/' \
            -ve './uv.lock' | xargs -I src cp --parents src ${{env.PLUGIN_NAME}}

      - name: Write version to metadata.txt
        run: |
          VERSION=${{ github.event.release.tag_name }}
          sed -i "s/^version=.*/version=$VERSION/" ${{env.PLUGIN_NAME}}/metadata.txt
          cat ${{env.PLUGIN_NAME}}/metadata.txt

      - name: Create Archive
        run: |
          zip -r ${{env.PLUGIN_NAME}}.zip ./${{env.PLUGIN_NAME}}

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{env.PLUGIN_NAME}}.zip#${{env.PLUGIN_NAME}}.zip --clobber

      - name: Upload to plugins.qgis.org
        run: |
          curl -X POST \
            "https://plugins.qgis.org/plugins/api/${{env.PLUGIN_NAME}}/version/add/" \
            -H "Authorization: Bearer ${{ secrets.QGIS_PLUGIN_TOKEN }}" \
            -F "package=@${{env.PLUGIN_NAME}}.zip" \
            --fail
