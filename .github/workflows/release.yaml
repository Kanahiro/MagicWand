name: export_plugin

on:
  release:
    types: [published]

env:
  PLUGIN_NAME: MagicWand
  # plugins.qgis.org には歴史的経緯（旧来 GitHub の master ブランチ ZIP を
  # そのままアップロードしていた）により "MagicWand-master" というパッケージ名で
  # 登録されているため、ZIP 内のトップレベルディレクトリ名はこの名前でなければならない。
  PACKAGE_DIR: MagicWand-master

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create Plugin Directory
        run: |
          mkdir ${{env.PACKAGE_DIR}}
          find . -type f | grep -ve './.git' \
            -ve '.github' \
            -ve '__pycache__/' \
            -ve './tests' \
            -ve './conftest.py' \
            -ve './pyproject.toml' \
            -ve './.gitignore' \
            -ve './README.md' \
            -ve './img/' \
            -ve './uv.lock' | xargs -I src cp --parents src ${{env.PACKAGE_DIR}}

      - name: Write version to metadata.txt
        run: |
          VERSION=${{ github.event.release.tag_name }}
          sed -i "s/^version=.*/version=$VERSION/" ${{env.PACKAGE_DIR}}/metadata.txt
          cat ${{env.PACKAGE_DIR}}/metadata.txt

      - name: Create Archive
        run: |
          zip -r ${{env.PLUGIN_NAME}}.zip ./${{env.PACKAGE_DIR}}

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} ${{env.PLUGIN_NAME}}.zip#${{env.PLUGIN_NAME}}.zip --clobber

      - name: Upload to plugins.qgis.org
        run: |
          curl -X POST \
            "https://plugins.qgis.org/plugins/api/${{env.PLUGIN_NAME}}/version/add/" \
            -H "Authorization: Bearer ${{ secrets.QGIS_PLUGIN_TOKEN }}" \
            -F "package=@${{env.PLUGIN_NAME}}.zip" \
            --fail
